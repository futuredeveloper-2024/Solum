<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantOrganizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">

      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);

        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
      }

      :root {
          --background: #0A110D;
        --foreground: #F0FDF4;
        --primary: #10B981;
        --primary-foreground: #022C22;
        --secondary: #1B2A20;
        --secondary-foreground: #A7F3D0;
        --muted: #16221A;
        --muted-foreground: #9CA3AF;
        --accent: #F59E0B;
        --accent-foreground: #FFFBEB;
        --destructive: #EF4444;
        --card: #111A14;
        --card-foreground: #F0FDF4;
        --popover: #111A14;
        --popover-foreground: #F0FDF4;
        --border: #203326;
        --input: #16221A;
        --ring: #10B981;
        --chart-1: #2DD4BF;
        --chart-2: #F59E0B;
        --chart-3: #3B82F6;
        --chart-4: #86EFAC;
        --chart-5: #8B5CF6;

        --font-sans: "Inter";
        --font-heading: "Plus Jakarta Sans";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 1.25rem;
      }
    </style>
  </head>
  <body>
    <div class="flex flex-col min-h-screen bg-background text-foreground font-sans pb-24">
      <header class="px-5 pt-8 pb-4 flex items-center justify-between">
        <div>
          <h1 class="font-heading text-3xl font-bold tracking-tight text-foreground">
            Your Garden
          </h1>
          <p class="text-sm text-muted-foreground">Manage sensors and channels</p>
        </div>
        <button
          class="bg-primary text-primary-foreground w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-primary/20"
        >
          <iconify-icon icon="hugeicons:add-01" class="size-6"></iconify-icon>
        </button>
      </header>
      <main class="px-5 flex-1 flex flex-col gap-6">
        <div class="flex items-center gap-4 bg-secondary/40 border border-border rounded-3xl p-4">
          <div class="flex-1 flex flex-col gap-1 border-r border-border">
            <span class="text-[10px] text-muted-foreground uppercase tracking-widest font-bold"
              >Total Plants</span
            ><span class="text-xl font-bold">03</span>
          </div>
          <div class="flex-1 flex flex-col gap-1 border-r border-border">
            <span class="text-[10px] text-muted-foreground uppercase tracking-widest font-bold"
              >Avg Health</span
            ><span class="text-xl font-bold text-primary">94%</span>
          </div>
          <div class="flex-1 flex flex-col gap-1">
            <span class="text-[10px] text-muted-foreground uppercase tracking-widest font-bold"
              >Channels</span
            ><span class="text-xl font-bold">3/8</span>
          </div>
        </div>
        <div class="flex flex-col gap-3">
          <div class="bg-card border border-border rounded-2xl p-4 flex items-center gap-4">
            <div
              class="w-12 h-12 bg-muted rounded-xl flex items-center justify-center overflow-hidden"
            >
              <img
                src="https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/reoq0uosIc8/components/igHOUVxWvZG.png"
                alt="Thumbnail"
                class="w-full h-full object-cover"
              />
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <h3 class="text-base font-semibold text-foreground truncate">Monstera</h3>
                <span
                  class="text-[10px] font-bold bg-muted text-muted-foreground px-1.5 py-0.5 rounded border border-border"
                  >CH 1</span
                >
              </div>
              <p class="text-xs text-muted-foreground">Healthy • Last check 2m ago</p>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
              <button class="text-muted-foreground hover:text-foreground">
                <iconify-icon icon="solar:menu-dots-vertical-linear" class="size-5"></iconify-icon>
              </button>
            </div>
          </div>
          <div class="bg-card border border-border rounded-2xl p-4 flex items-center gap-4">
            <div
              class="w-12 h-12 bg-muted rounded-xl flex items-center justify-center overflow-hidden"
            >
              <img
                src="https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/reoq0uosIc8/components/4Csh5SK28xc.png"
                alt="Thumbnail"
                class="w-full h-full object-cover"
              />
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <h3 class="text-base font-semibold text-foreground truncate">Rubber Tree</h3>
                <span
                  class="text-[10px] font-bold bg-muted text-muted-foreground px-1.5 py-0.5 rounded border border-border"
                  >CH 2</span
                >
              </div>
              <p class="text-xs text-muted-foreground">Needs Water • Last check 5m ago</p>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-2 h-2 rounded-full bg-accent"></div>
              <button class="text-muted-foreground hover:text-foreground">
                <iconify-icon icon="solar:menu-dots-vertical-linear" class="size-5"></iconify-icon>
              </button>
            </div>
          </div>
          <div class="bg-card border border-border rounded-2xl p-4 flex items-center gap-4">
            <div
              class="w-12 h-12 bg-muted rounded-xl flex items-center justify-center overflow-hidden"
            >
              <img
                src="https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/reoq0uosIc8/components/yIZ7dXgYOFI.png"
                alt="Thumbnail"
                class="w-full h-full object-cover"
              />
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <h3 class="text-base font-semibold text-foreground truncate">Neon Pothos</h3>
                <span
                  class="text-[10px] font-bold bg-muted text-muted-foreground px-1.5 py-0.5 rounded border border-border"
                  >CH 3</span
                >
              </div>
              <p class="text-xs text-muted-foreground">Saturated • Last check 1m ago</p>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-2 h-2 rounded-full bg-chart-3"></div>
              <button class="text-muted-foreground hover:text-foreground">
                <iconify-icon icon="solar:menu-dots-vertical-linear" class="size-5"></iconify-icon>
              </button>
            </div>
          </div>
          <div
            class="mt-4 border-2 border-dashed border-border rounded-2xl p-6 flex flex-col items-center justify-center text-center gap-2 text-muted-foreground"
          >
            <iconify-icon icon="solar:reorder-linear" class="size-8 opacity-20"></iconify-icon>
            <p class="text-sm italic">Long press to reorder plants</p>
          </div>
        </div>
      </main>
      <nav
        class="fixed bottom-0 left-0 right-0 bg-background/90 backdrop-blur-xl border-t border-border pb-safe pt-2 px-6 z-30"
      >
        <div class="flex items-center justify-between pb-2">
          <a
            href="#"
            class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground transition-colors p-2"
            ><iconify-icon icon="solar:home-2-linear" class="size-6"></iconify-icon
            ><span class="text-[10px] font-medium">Home</span></a
          ><a href="#" class="flex flex-col items-center gap-1 text-primary p-2"
            ><iconify-icon icon="solar:leaf-bold" class="size-6"></iconify-icon
            ><span class="text-[10px] font-semibold">Plants</span></a
          ><a
            href="#"
            class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground transition-colors p-2"
            ><iconify-icon icon="solar:history-linear" class="size-6"></iconify-icon
            ><span class="text-[10px] font-medium">Automations</span></a
          ><a
            href="#"
            class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground transition-colors p-2"
            ><iconify-icon icon="solar:settings-linear" class="size-6"></iconify-icon
            ><span class="text-[10px] font-medium">Settings</span></a
          >
        </div>
      </nav>
    </div>
  </body>
</html>
